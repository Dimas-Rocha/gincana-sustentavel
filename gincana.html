<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌱 Gincana Sustentável - Salve o Planeta!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b6623 0%, #1e8f3e 50%, #2ecc71 100%);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Container principal */
        .game-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);
        }

        /* Header com pontuação */
        .game-header {
            background: #1e4d2e;
            padding: 20px 24px;
            color: white;
            text-align: center;
        }

        .game-header h1 {
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .score-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .score-card, .streak-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
        }

        .progress-area {
            margin-top: 15px;
        }

        .progress-bar-bg {
            background: #2c3e2f;
            border-radius: 30px;
            height: 20px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f1c40f, #2ecc71);
            border-radius: 30px;
            transition: width 0.4s ease;
            box-shadow: 0 0 8px #f1c40f;
        }

        .progress-text {
            font-size: 0.8rem;
            margin-top: 6px;
            text-align: right;
        }
         /* Dica do dia */
        .tip-box {
            background: #eaf7ea;
            margin: 16px 24px;
            padding: 14px 18px;
            border-radius: 28px;
            border-left: 8px solid #2ecc71;
            font-weight: 500;
            color: #1f3b2c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tip-icon {
            font-size: 1.8rem;
        }

        .tip-text {
            flex: 1;
        }

        /* Perguntas */
        .quiz-area {
            padding: 10px 24px 30px;
        }

        .question {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 24px;
            color: #1f3b2c;
            line-height: 1.3;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: #f4f9f5;
            border: 2px solid #c8e6d9;
            padding: 14px 18px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e3a2f;
        }

        .option-btn:hover:not(:disabled) {
            background: #d3efdf;
            transform: scale(1.01);
            border-color: #2ecc71;
        }

        .option-btn.correct-highlight {
            background: #2ecc71;
            color: white;
            border-color: #1f8b4c;
        }

        .option-btn.wrong-highlight {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .feedback {
            background: #f0f3ef;
            padding: 18px;
            border-radius: 28px;
            margin: 15px 0;
            text-align: center;
            font-weight: 500;
            border-left: 5px solid;
            transition: 0.2s;
        }

        .next-btn, .restart-btn {
            background: #2e7d32;
            border: none;
            color: white;
            padding: 14px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-top: 10px;
        }

        .next-btn:hover, .restart-btn:hover {
            background: #1b5e20;
            transform: translateY(-2px);
        }

        .ranking-area {
            background: #eef3ea;
            padding: 16px 24px;
            border-top: 1px solid #bfdfb4;
            text-align: center;
        }

        .ranking-area h3 {
            color: #1e5a2e;
        }

        .ranking-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 8px;
            font-weight: bold;
        }

        .game-over-message {
            background: #e67e22;
            color: white;
            padding: 18px;
            border-radius: 30px;
            text-align: center;
            margin: 15px 0;
        }

        button {
            background: none;
            border: none;
        }

        @media (max-width: 550px) {
            .game-container {
                border-radius: 32px;
            }
            .question {
                font-size: 1.2rem;
            }
            .score-card, .streak-card {
                font-size: 0.9rem;
            }
        }
