<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌱 Gincana Sustentável - Salve o Planeta!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b6623 0%, #1e8f3e 50%, #2ecc71 100%);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Container principal */
        .game-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);
        }

        /* Header com pontuação */
        .game-header {
            background: #1e4d2e;
            padding: 20px 24px;
            color: white;
            text-align: center;
        }

        .game-header h1 {
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .score-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .score-card, .streak-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
        }

        .progress-area {
            margin-top: 15px;
        }

        .progress-bar-bg {
            background: #2c3e2f;
            border-radius: 30px;
            height: 20px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f1c40f, #2ecc71);
            border-radius: 30px;
            transition: width 0.4s ease;
            box-shadow: 0 0 8px #f1c40f;
        }

        .progress-text {
            font-size: 0.8rem;
            margin-top: 6px;
            text-align: right;
        }
         /* Dica do dia */
        .tip-box {
            background: #eaf7ea;
            margin: 16px 24px;
            padding: 14px 18px;
            border-radius: 28px;
            border-left: 8px solid #2ecc71;
            font-weight: 500;
            color: #1f3b2c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tip-icon {
            font-size: 1.8rem;
        }

        .tip-text {
            flex: 1;
        }

        /* Perguntas */
        .quiz-area {
            padding: 10px 24px 30px;
        }

        .question {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 24px;
            color: #1f3b2c;
            line-height: 1.3;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: #f4f9f5;
            border: 2px solid #c8e6d9;
            padding: 14px 18px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e3a2f;
        }

        .option-btn:hover:not(:disabled) {
            background: #d3efdf;
            transform: scale(1.01);
            border-color: #2ecc71;
        }

        .option-btn.correct-highlight {
            background: #2ecc71;
            color: white;
            border-color: #1f8b4c;
        }

        .option-btn.wrong-highlight {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .feedback {
            background: #f0f3ef;
            padding: 18px;
            border-radius: 28px;
            margin: 15px 0;
            text-align: center;
            font-weight: 500;
            border-left: 5px solid;
            transition: 0.2s;
        }

        .next-btn, .restart-btn {
            background: #2e7d32;
            border: none;
            color: white;
            padding: 14px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-top: 10px;
        }

        .next-btn:hover, .restart-btn:hover {
            background: #1b5e20;
            transform: translateY(-2px);
        }

        .ranking-area {
            background: #eef3ea;
            padding: 16px 24px;
            border-top: 1px solid #bfdfb4;
            text-align: center;
        }

        .ranking-area h3 {
            color: #1e5a2e;
        }

        .ranking-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 8px;
            font-weight: bold;
        }

        .game-over-message {
            background: #e67e22;
            color: white;
            padding: 18px;
            border-radius: 30px;
            text-align: center;
            margin: 15px 0;
        }

        button {
            background: none;
            border: none;
        }

        @media (max-width: 550px) {
            .game-container {
                border-radius: 32px;
            }
            .question {
                font-size: 1.2rem;
            }
            .score-card, .streak-card {
                font-size: 0.9rem;
            }
        }
         </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="game-header">
        <h1>🌍 Gincana Sustentável 🌱</h1>
        <div class="score-area">
            <div class="score-card">🏆 Pontos: <span id="scoreValue">0</span></div>
            <div class="streak-card">🔥 Sequência: <span id="streakValue">0</span></div>
        </div>
        <div class="progress-area">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0/100 pts</div>
        </div>
    </div>

    <div class="tip-box" id="tipBox">
        <div class="tip-icon">💡</div>
        <div class="tip-text" id="tipText">Carregando dica sustentável...</div>
    </div>

    <div class="quiz-area" id="quizArea">
        <div class="question" id="questionText">Pergunta carregando...</div>
        <div class="options" id="optionsContainer"></div>
        <div class="feedback" id="feedbackMsg"></div>
        <button class="next-btn" id="nextBtn" style="display: none;">🌿 Próxima pergunta</button>
        <button class="restart-btn" id="restartGameBtn" style="display: none;">♻️ Recomeçar Gincana</button>
    </div>

    <div class="ranking-area">
        <h3>🏅 Ranking Local - Heróis</h3>
        <div class="ranking-list" id="rankingList">--</div>
    </div>
</div>

<script>
  
    // ===================== PERGUNTAS SUSTENTÁVEIS =====================
    const questions = [
        { text: "Qual destes materiais leva mais tempo para se decompor na natureza?", options: ["Papel", "Vidro", "Casca de fruta", "Garrafa PET"], correct: 1 },
        { text: "Qual atitude ajuda a economizar água no dia a dia?", options: ["Escovar os dentes com torneira aberta", "Tomar banhos longos", "Reutilizar água da máquina de lavar", "Lavar calçada com mangueira"], correct: 2 },
        { text: "O que significa a sigla '3R' da sustentabilidade?", options: ["Reciclar, Recuperar, Reflorestar", "Reduzir, Reutilizar, Reciclar", "Revitalizar, Renovar, Regenerar", "Recolher, Reaproveitar, Reinserir"], correct: 1 },
        { text: "Qual fonte de energia é considerada RENOVÁVEL e LIMPA?", options: ["Carvão mineral", "Energia nuclear", "Solar fotovoltaica", "Gás natural"], correct: 2 },
        { text: "Separar lixo orgânico do reciclável ajuda principalmente a:", options: ["Reduzir o volume nos aterros", "Economizar água", "Diminuir o buraco na camada de ozônio", "Aumentar a produção de plástico"], correct: 0 },
        { text: "O que é pegada de carbono?", options: ["Quantidade de CO2 emitida por atividades humanas", "Marca deixada no chão", "Carro movido a gasolina", "Medida de reciclagem"], correct: 0 },
        { text: "Qual destes NÃO é um plástico reciclável comum?", options: ["Garrafa PET", "Saco plástico transparente", "Canudo biodegradável PLA", "Pote de margarina"], correct: 2 },
        { text: "Deixar o computador em modo 'suspensão' ao invés de 'ligado' ajuda a:", options: ["Economizar energia elétrica", "Acelerar o processador", "Aumentar a vida útil da tela", "Poluir menos o ar"], correct: 0 },
        { text: "Plantar árvores urbanas contribui para:", options: ["Reduzir ilhas de calor e CO2", "Atrair muitas pragas", "Aumentar enchentes", "Poluir o solo"], correct: 0 },
        { text: "Qual material reciclado pode virar novas garrafas, tecidos e cordas?", options: ["Papelão", "Vidro", "Alumínio", "PET plástico"], correct: 3 }
    ];
    // Dicas sustentáveis (8+)
    const tips = [
        "💧 Tome banhos de até 5 minutos: economiza 95 litros de água!",
        "🔌 Tire aparelhos da tomada quando não usar: evita consumo fantasma.",
        "🥤 Use garrafas reutilizáveis: uma garrafa plástica leva 450 anos para sumir.",
        "📦 Reaproveite potes de vidro como organizadores ou vasos.",
        "🚲 Prefira transportes coletivos ou bicicleta, reduza CO₂.",
        "🧴 Evite microplásticos: prefira produtos com embalagem biodegradável.",
        "♻️ Lave latinhas antes de reciclar e amasse para economizar espaço.",
        "🌱 Plante uma muda por mês: cada árvore retém 10kg de CO₂ por ano.",
        "🍌 Cascas de frutas viram adubo: faça compostagem caseira!",
        "📄 Utilize os dois lados do papel e opte por papel reciclado."
    ];
 // Estado do jogo
    let currentQuestionIndex = 0;
    let score = 0;
    let streak = 0;
    let multiplierActive = 0;      // contador p/ multiplicador de 10->20 a cada 3 seguidos
    let consecutiveCorrect = 0;
    let mistakesInRow = 0;
    let gameActive = true;
    let waitingAnswer = true;       // se já respondeu, aguarda next
    let selectedOptionIndex = null;
    
    // Elementos DOM
    const questionEl = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackMsgDiv = document.getElementById("feedbackMsg");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartGameBtn");
    const scoreSpan = document.getElementById("scoreValue");
    const streakSpan = document.getElementById("streakValue");
    const progressFill = document.getElementById("progressFill");
    const progressTextSpan = document.getElementById("progressText");
    const tipTextSpan = document.getElementById("tipText");

 // Ranking localStorage
    let ranking = [];

    function loadRanking() {
        const stored = localStorage.getItem("sustentRanking");
        if (stored) {
            ranking = JSON.parse(stored);
        } else {
            ranking = [];
        }
        updateRankingUI();
    }

    function saveRanking() {
        ranking.sort((a,b) => b.score - a.score);
        if (ranking.length > 3) ranking = ranking.slice(0,3);
        localStorage.setItem("sustentRanking", JSON.stringify(ranking));
        updateRankingUI();
    }

    function addScoreToRanking(finalScore) {
        let playerName = "🌱 Herói";
        ranking.push({ name: playerName, score: finalScore });
        saveRanking();
    }

    function updateRankingUI() {
        const rankDiv = document.getElementById("rankingList");
        if (!ranking.length) {
            rankDiv.innerHTML = "💚 Nenhuma pontuação ainda. Jogue e brilhe!";
            return;
        }
        let html = "";
        ranking.forEach((r, idx) => {
            html += `<div>${idx+1}º ${r.name} ${r.score}pts</div>`;
        });
        rankDiv.innerHTML = html;
    }

    function updateUI() {
        scoreSpan.innerText = score;
        streakSpan.innerText = consecutiveCorrect;
        let percentage = Math.min(100, (score / 100) * 100);
        progressFill.style.width = percentage + "%";
        progressTextSpan.innerText = `${score}/100 pts`;
        if (score >= 100 && gameActive) {
            gameWon();
        }
    }

    function showRandomTip() {
        const randomTip = tips[Math.floor(Math.random() * tips.length)];
        tipTextSpan.innerText = randomTip;
    }

    function gameWon() {
        if (!gameActive) return;
        gameActive = false;
        waitingAnswer = true;
        feedbackMsgDiv.innerHTML = "🏆✨ PARABÉNS! Você salvou o planeta com atitudes sustentáveis! ✨🏆<br>Clique em RECOMEÇAR para outra jornada.";
        nextBtn.style.display = "none";
        restartBtn.style.display = "block";
        addScoreToRanking(score);
        disableOptions(true);
    }

    function gameOverByMistakes() {
        if (!gameActive) return;
        gameActive = false;
        waitingAnswer = true;
        feedbackMsgDiv.innerHTML = "⚠️ GAME OVER! Muitos erros consecutivos. Reforce seus conhecimentos sustentáveis e tente novamente! ⚠️";
        nextBtn.style.display = "none";
        restartBtn.style.display = "block";
        disableOptions(true);
        addScoreToRanking(score);
    }

    function checkWinOnScore() {
        if (score >= 100 && gameActive) {
            gameWon();
            return true;
        }
        return false;
    }

    function disableOptions(disable) {
        const allOpts = document.querySelectorAll(".option-btn");
        allOpts.forEach(btn => {
            if (disable) btn.disabled = true;
            else btn.disabled = false;
        });
    }

    function evaluateAnswer(selectedIdx, correctIdx, btnElement, allBtns) {
        if (!gameActive || !waitingAnswer) return;
        waitingAnswer = false;

        const isCorrect = (selectedIdx === correctIdx);
        let pointGain = 0;
        let message = "";

        if (isCorrect) {
            // Cálculo com multiplicador
            consecutiveCorrect++;
            mistakesInRow = 0;
            let basePoints = 10;
            if (consecutiveCorrect >= 3 && consecutiveCorrect % 3 === 0) {
                basePoints = 20;
                message = "🌟🔥 BÔNUS: Sequência de 3 acertos! +20 pontos! 🔥🌟";
            } else {
                message = "✅ Correto! +10 pontos sustentáveis! 🌿";
            }
            pointGain = basePoints;
            score += pointGain;
            // Verificar vitória automaticamente
            if (score >= 100) {
                updateUI();
                if(!checkWinOnScore()){}
                else return;
            }
            feedbackMsgDiv.innerHTML = message + ` Agora você tem ${score} pontos.`;
            // destacar verde
            btnElement.classList.add("correct-highlight");
        } else {
            // Erro!
            consecutiveCorrect = 0;
            mistakesInRow++;
            pointGain = -5;
            let newScore = score + pointGain;
            if (newScore < 0) newScore = 0;
            score = newScore;
            const correctAnswerText = questions[currentQuestionIndex].options[correctIdx];
            feedbackMsgDiv.innerHTML = `❌ Errado! A resposta correta é: "${correctAnswerText}". Estude e tente novamente! -5 pontos.`;
            btnElement.classList.add("wrong-highlight");
            // destaca botão correto também?
            allBtns[correctIdx].classList.add("correct-highlight");
            if (mistakesInRow >= 5 && gameActive) {
                updateUI();
                gameOverByMistakes();
                return;
            }
        }
 updateUI();

        // ao atingir 30 pontos múltiplo (bônus extra)
        if (isCorrect && score % 30 === 0 && score > 0) {
            feedbackMsgDiv.innerHTML += "<br>🎁 BÔNUS: 🌱 Você plantou uma árvore virtual! Continue assim 🎁";
        }

        disableOptions(true);
        nextBtn.style.display = "block";
        if (!gameActive) nextBtn.style.display = "none";
    }
     function loadQuestion() {
        if (!gameActive) return;
        waitingAnswer = true;
        selectedOptionIndex = null;
        const qData = questions[currentQuestionIndex];
        questionEl.innerText = qData.text;
        optionsContainer.innerHTML = "";
        // gerar botoes
        qData.options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.setAttribute("data-opt-idx", idx);
            btn.addEventListener("click", (e) => {
                if (!waitingAnswer || !gameActive) return;
                const allCurrentBtns = document.querySelectorAll(".option-btn");
                evaluateAnswer(idx, qData.correct, btn, allCurrentBtns);
            });
            optionsContainer.appendChild(btn);
        });


         // Apaga destaque anterior no feedback se não for mensagem de Game over
        if (!feedbackMsgDiv.innerHTML.includes("GAME OVER") && !feedbackMsgDiv.innerHTML.includes("PARABÉNS"))
            feedbackMsgDiv.innerHTML = "🌎 Escolha uma alternativa...";
        nextBtn.style.display = "none";
        disableOptions(false);
        showRandomTip();
    }

    function nextQuestion() {
        if (!gameActive) return;
        if (waitingAnswer === false || nextBtn.style.display === "block") {
            // avança
            currentQuestionIndex = (currentQuestionIndex + 1) % questions.length;
            loadQuestion();
        } else {
            // se não respondeu ainda, não avança
            feedbackMsgDiv.innerHTML = "💚 Responda a pergunta atual antes de continuar!";
        }
    }

 function restartGame(){
        score = 0;
        consecutiveCorrect = 0;
        mistakesInRow = 0;
        gameActive = true;
        waitingAnswer = true;
        currentQuestionIndex = 0;
        updateUI();
        loadQuestion();
        nextBtn.style.display = "none";
        restartBtn.style.display = "none";
        feedbackMsgDiv.innerHTML = "🌱 Nova gincana! Vamos salvar o planeta. Boa sorte!";
        disableOptions(false);
        // não reseta ranking, apenas começa novo jogo
    }

    // Eventos
    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", () => {
        restartGame();
    });





</script>
</body>
</html>
